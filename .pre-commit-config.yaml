# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
ci:
  skip:
    - uv-lock
    - cargo-fmt
exclude: |
  (?x)^(
    crates/fricon-ui/icons/.*|
    crates/fricon-ui/frontend/src/shared/lib/bindings\.ts|
    crates/fricon-ui/frontend/src/routeTree\.gen\.ts|
    crates/fricon/src/database/schema\.rs
  )$
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: 99bafab22429e58887b8c3e2666597b4b7fadf5b  # frozen: v0.9.4
    hooks:
      - id: tombi-format
        exclude: Cargo\.lock
        args: ["--offline"]
  - repo: https://github.com/crate-ci/typos
    rev: 5745f2a8dd91cd7b684680e2e10a2b388ba6e5cf  # frozen: v1
    hooks:
      - id: typos
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: e38709b2694c2988ab0c618ee63ac156e155d5c4  # frozen: 0.10.9
    hooks:
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: b969e2851312ca2b24bbec879ba4954341d1bd12  # frozen: v0.15.5
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: ca2e228d873e15bca82cd588f1964f0ec0aa9762  # frozen: 4.0.4
    hooks:
      - id: sqlfluff-lint
      - id: sqlfluff-fix
  # Copied from maturin repo
  - repo: local
    hooks:
      - id: cargo-fmt # rustup component add rustfmt
        name: cargo fmt
        entry: cargo +nightly fmt --all --
        language: system
        types: [rust]
        pass_filenames: false
