# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
ci:
  skip:
    - buf-lint
    - buf-format
    - uv-lock
    - cargo-fmt
    - cargo-deny
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b  # frozen: v5.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-toml
  - id: check-added-large-files
- repo: https://github.com/crate-ci/typos
  rev: a6d2f47d4902ee6df75b9392dd3f7a120fdf3619  # frozen: v1
  hooks:
    - id: typos
- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 4b4f19e679c52e9537d1c43a6690e4c0ae457ec5  # frozen: 0.6.11
  hooks:
    - id: uv-lock
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 25a8c8da6c24a3b9a1a536e2674683dd0eead5d6  # frozen: v0.11.2
  hooks:
    - id: ruff
      args: [ --fix ]
    - id: ruff-format
- repo: https://github.com/sqlfluff/sqlfluff
  rev: e11aa234ede6ff0b70a054621cc968d555f02055  # frozen: 3.3.1
  hooks:
    - id: sqlfluff-lint
    - id: sqlfluff-fix
- repo: https://github.com/bufbuild/buf
  rev: 3905aaefcbef156244357819fe1da46ec1af448f  # frozen: v1.51.0
  hooks:
    - id: buf-lint
    - id: buf-format
# Copied from maturin repo
- repo: local
  hooks:
    - id: cargo-fmt  # rustup component add rustfmt
      name: cargo fmt
      entry: cargo fmt --all --
      language: system
      types: [rust]
      pass_filenames: false
    - id: cargo-deny  # cargo install --locked cargo-deny
      name: cargo deny
      entry: cargo deny --all-features check --
      language: system
      pass_filenames: false
