name: Deploy Docs

on:
  push:
    branches:
      - main
    tags:
      - "**"

concurrency:
  group: deploy-docs
  cancel-in-progress: false

permissions: {}

jobs:
  mike-deploy:
    name: Build And Publish Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for mike to push the built site to the gh-pages branch.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install build dependencies
        uses: taiki-e/install-action@be9d4e566a6d59aa24f9976dab45072b36fc8b45 # v2.0.3
        with:
          tool: protoc
      - name: Set docs version tag
        run: |
          version="$(
            cargo metadata --no-deps --format-version 1 |
              jq -r '.packages[] | select(.name == "fricon-py") | .version'
          )"
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "fricon-py version not found in cargo metadata" >&2
            exit 1
          fi
          IFS=. read -r major minor _ <<EOF
          $version
          EOF
          if [ -z "$major" ] || [ -z "$minor" ]; then
            echo "Invalid workspace version: $version" >&2
            exit 1
          fi
          echo "FRICON_DOCS_TAG=$major.$minor" >> "$GITHUB_ENV"
      - name: Install fricon Python extension for docs
        run: |
          uv sync --locked --group docs --no-install-project
          uv run --no-sync maturin develop --no-default-features --features docs
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin gh-pages --depth=1
      - name: Build docs
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            uv run --no-sync --group docs mike deploy --push --update-aliases "$FRICON_DOCS_TAG" latest
          else
            uv run --no-sync --group docs mike deploy --push dev
          fi
