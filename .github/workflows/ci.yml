name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # renovate: datasource=github-releases depName=knope-dev/knope
  KNOPE_VERSION: 0.22.4

jobs:
  fmt:
    name: Verify Formatting And Generated Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.x"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Install Knope
        uses: knope-dev/action@19617851f9f13ab2f27a05989c55efb18aca3675 # v2.1.2
        with:
          version: ${{ env.KNOPE_VERSION }}
      - name: Ruff format
        run: uv run --only-group fmt ruff format --check
      - name: Ruff lint
        run: uv run --only-group fmt ruff check --output-format=github
      - name: Cargo fmt
        run: |
          rustup toolchain install nightly --component rustfmt
          cargo +nightly fmt --all --check
      - name: Frontend check
        run: pnpm run check
      - name: Frontend format check
        run: pnpm run format:check
      - name: Validate Knope release config
        run: knope --validate
      - name: Check route tree is up-to-date
        run: |
          git diff --exit-code crates/fricon-ui/frontend/src/routeTree.gen.ts

  test:
    name: Build And Test Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@80e6af7a2ec7f280fffe2d0a9d3a12a9d11d86e9 # v2
        with:
          tool: protoc
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.x"
          cache: "pnpm"
      - name: Install Node dependencies
        run: pnpm install
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Cargo build
        run: cargo build --workspace --verbose --locked
      - name: Generate Tauri bindings
        run: pnpm --filter fricon-ui run gen:bindings
      - name: Check Tauri bindings are up-to-date
        run: git diff --exit-code crates/fricon-ui/frontend/src/shared/lib/bindings.ts
      - name: Cargo test
        run: cargo test --workspace --verbose
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Sync project
        run: uv sync --locked --group ci
      - name: Pytest
        run: uv run pytest
      - name: Frontend Test
        run: pnpm run test
      - name: Basedpyright
        run: uv run basedpyright
      - name: Stubtest
        run: uv run stubtest fricon._core
      - name: Build docs
        run: uv run --group docs mkdocs build -s -v

  cargo-deny:
    name: Audit Cargo Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@80e6af7a2ec7f280fffe2d0a9d3a12a9d11d86e9 # v2
        with:
          tool: cargo-deny
      - name: Check cargo dependencies
        run: cargo deny --workspace --all-features check

  build:
    name: Build Wheel Artifacts
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Windows x86_64
          - runner: windows-latest
            os: windows
            target: x86_64
            args: --release --out dist
            cflags: ""
            rustflags: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@80e6af7a2ec7f280fffe2d0a9d3a12a9d11d86e9 # v2
        with:
          tool: protoc,cargo-bundle-licenses
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.x"
          cache: "pnpm"
      - name: Install Node dependencies
        run: pnpm install
      - name: Bundle licenses
        run: pnpm run bundle-licenses
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          args: ${{ matrix.args }}
          manylinux: auto
        env:
          CFLAGS: ${{ matrix.cflags }}
          RUSTFLAGS: ${{ matrix.rustflags }}
      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  sdist:
    name: Build Source Distribution Artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@80e6af7a2ec7f280fffe2d0a9d3a12a9d11d86e9 # v2
        with:
          tool: cargo-bundle-licenses
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24.x"
          cache: "pnpm"
      - name: Install Node dependencies
        run: pnpm install
      - name: Bundle licenses
        run: pnpm run bundle-licenses
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wheels-sdist
          path: dist

  # For branch protection rules
  check:
    name: Report Required CI Status
    if: always()
    needs: [fmt, test, cargo-deny, build, sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  release:
    name: Release After CI
    needs: [check]
    # This relies on squash-and-merge preserving Knope's `chore: prepare release <version>`
    # subject on the resulting `main` commit so only prepared release merges call the reusable
    # release workflow.
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      startsWith(github.event.head_commit.message, 'chore: prepare release ')
    uses: ./.github/workflows/release.yml
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
