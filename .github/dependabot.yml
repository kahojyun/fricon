version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      pyo3-stack:
        patterns:
          - "pyo3"
          - "pyo3-*"
          - "numpy"
          - "arrow-*"
      cargo-non-breaking:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      cargo-major:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "uv"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      uv-non-breaking:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      uv-major:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-non-breaking:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      npm-major:
        patterns: ["*"]
        update-types: ["major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns: ["*"]
